version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: trainerhub-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: trainerHub
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - trainerhub-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/trainerHub --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trainerhub-app
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/trainerHub?authSource=admin
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - trainerhub-network

networks:
  trainerhub-network:
    driver: bridge

volumes:
  mongo_data:
