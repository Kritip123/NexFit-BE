version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: nexfit-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: nexfit
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - nexfit-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/nexfit --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexfit-app
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/nexfit?authSource=admin
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      AWS_S3_ENABLED: ${AWS_S3_ENABLED:-false}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-nexfit-media-dev}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - nexfit-network

networks:
  nexfit-network:
    driver: bridge

volumes:
  mongo_data:
