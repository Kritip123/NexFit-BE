# Docker Profile Configuration
spring.application.name=TrainerHub
server.port=8080
server.servlet.context-path=/api/v1

# MongoDB Configuration (Docker)
spring.data.mongodb.uri=mongodb://admin:admin123@mongodb:27017/trainerHub?authSource=admin
spring.data.mongodb.database=trainerHub

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.path=/app/uploads

# Jackson Configuration
spring.jackson.time-zone=Australia/Sydney
spring.jackson.mapper.accept-case-insensitive-enums=true

# Logging Configuration
logging.level.root=INFO
logging.level.org.example.trainerhub=DEBUG

# CORS Configuration
cors.allowed.origins=*
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=false

# Application Specific Configuration
app.currency=AUD
app.support-email=support@trainerhub.com.au
