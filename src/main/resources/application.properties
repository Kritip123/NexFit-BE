# Application Configuration
spring.application.name=NexFit-BE
server.port=8080
server.address=0.0.0.0
server.servlet.context-path=/api/v1

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/nexfit
spring.data.mongodb.database=nexfit

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:support@nexfit.com.au}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.path=./uploads

# Jackson Configuration
spring.jackson.time-zone=Australia/Sydney
spring.jackson.mapper.accept-case-insensitive-enums=true

# Logging Configuration
logging.level.root=INFO
logging.level.org.example.nexfit=DEBUG
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:8081
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=true

# Application Specific Configuration
app.currency=AUD
app.support-email=support@nexfit.com.au
