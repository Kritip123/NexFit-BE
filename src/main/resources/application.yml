spring:
  application:
    name: NexFit-BE

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/nexfit}
      database: ${MONGODB_DATABASE:nexfit}
      auto-index-creation: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:support@nexfit.com.au}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  jackson:
    time-zone: Australia/Sydney
    mapper:
      accept-case-insensitive-enums: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours
  refresh:
    expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

cors:
  allowed:
    origins: "*"
    methods: GET,POST,PUT,DELETE,OPTIONS
    headers: "*"
  allow:
    credentials: false

app:
  currency: AUD
  support-email: support@nexfit.com.au

launchdarkly:
  enabled: ${LAUNCHDARKLY_ENABLED:false}
  sdk-key: ${LAUNCHDARKLY_SDK_KEY:}
  flag-key: ${LAUNCHDARKLY_FLAG_KEY:verified-trainers}

upload:
  path: ${UPLOAD_PATH:./uploads}

# AWS S3 Configuration
aws:
  region: ap-southeast-2
  access-key: ${AWS_ACCESS_KEY:AKIARWXCVXXRFLLSXABA}
  secret-key: ${AWS_SECRET_KEY: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}
  s3:
    bucket: nexfit-media-prod
    enabled: true
    presigned-url-expiry: 900  # 15 minutes
  cloudfront:
    domain: ${AWS_CLOUDFRONT_DOMAIN:}
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      enabled: true
  health:
    mail:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.example.nexfit: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.data.mongodb.core.MongoTemplate: ${LOG_LEVEL_MONGO:INFO}
    software.amazon.awssdk: ${LOG_LEVEL_AWS:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/nexfit.log
    max-size: 10MB
    max-history: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: true
